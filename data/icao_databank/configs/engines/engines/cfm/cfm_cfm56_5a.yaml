identification:
  CFM56-5A: CFM56-5A

remove: []

update:
  1CM009:
    engine: CFM56-5A
  4CM035:
    engine: CFM56-5A
  4CM036:
    engine: CFM56-5A



validation:
  opr:
    databank: certification
    x_axis: rated_thrust
    y_axis: opr
    xlim: [0, 200]
    ylim: [20, 35]
    regression_polynomial_order: 1
    
  bpr:
    databank: certification
    x_axis: rated_thrust
    y_axis: bpr
    xlim: [0, 200]
    ylim: [0, 7]
    regression_polynomial_order: 2
    
  einox:
    databank: emissions
    x_axis: thrust
    y_axis: einox
    xlim: [0, 200]
    ylim: [0, 60]
    regression_polynomial_order: null
    
  eico:
    databank: emissions
    x_axis: thrust
    y_axis: eico
    xlim: [0, 200]
    ylim: [0, 50]
    regression_polynomial_order: null
    
  eihc:
    databank: emissions
    x_axis: thrust
    y_axis: eihc
    xlim: [0, 200]
    ylim: [0, 15]
    regression_polynomial_order: null
  
  smoke_number:
    databank: emissions
    x_axis: thrust
    y_axis: smoke_number
    xlim: [0, 200]
    ylim: [0, 20]
    regression_polynomial_order: null

  fuel_flow:
    databank: emissions
    x_axis: thrust
    y_axis: fuel_flow
    xlim: [0, 200]
    ylim: [0, 1.5]
    regression_polynomial_order: null