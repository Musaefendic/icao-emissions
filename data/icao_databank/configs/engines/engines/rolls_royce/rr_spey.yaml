identification:
  SPEY: SPEY

remove: 
  - 1RR015  # data superseded by UID: 8RR043, SN (char) wrongly calculated originally as 77.9 [1RR015].

update:
  # SPEY MK511
  8RR043:
    engine: SPEY MK511
  
  # SPEY MK511 TRANSPLY IIH
  01P11PJ003:
    engine: SPEY MK511 TRANSPLY IIH
    
  # SPEY MK555
  1RR017:
    engine: SPEY MK555

  # SPEY MK555 TRANSPLY IIF
  1RR018:
    engine: SPEY MK555 TRANSPLY IIF
  4RR035:
    engine: SPEY MK555 TRANSPLY IIF


validation:
  opr:
    databank: certification
    x_axis: rated_thrust
    y_axis: opr
    xlim: [0, 100]
    ylim: [0, 25]
    regression_polynomial_order: 1
    
  bpr:
    databank: certification
    x_axis: rated_thrust
    y_axis: bpr
    xlim: [0, 100]
    ylim: [0, 4]
    regression_polynomial_order: 2
    
  einox:
    databank: emissions
    x_axis: thrust
    y_axis: einox
    xlim: [0, 100]
    ylim: [0, 30]
    regression_polynomial_order: null
    
  eico:
    databank: emissions
    x_axis: thrust
    y_axis: eico
    xlim: [0, 100]
    ylim: [0, 120]
    regression_polynomial_order: null
    
  eihc:
    databank: emissions
    x_axis: thrust
    y_axis: eihc
    xlim: [0, 100]
    ylim: [0, 100]
    regression_polynomial_order: null
  
  smoke_number:
    databank: emissions
    x_axis: thrust
    y_axis: smoke_number
    xlim: [0, 100]
    ylim: [0, 40]
    regression_polynomial_order: null

  fuel_flow:
    databank: emissions
    x_axis: thrust
    y_axis: fuel_flow
    xlim: [0, 100]
    ylim: [0, 2.0]
    regression_polynomial_order: null
