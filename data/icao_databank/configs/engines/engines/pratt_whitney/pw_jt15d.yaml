identification:
  JT15D: JT15D

remove: []

update:
  1PW035:
    engine: JT15D-1
    model: JT15D-1
  1PW036:
    engine: JT15D-4
    model: JT15D-4
  1PW037:
    engine: JT15D-5
    model: JT15D-5A
  1PW038:
