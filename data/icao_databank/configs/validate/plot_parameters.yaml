PW1100G:
  opr:
    databank: certification
    x_axis: rated_thrust
    y_axis: opr
    xlim: [0, 200]
    ylim: [14, 40]
    polynomial_order: 1
    
  bpr:
    databank: certification
    x_axis: rated_thrust
    y_axis: bpr
    xlim: [0, 200]
    # ylim: [14, 40]
    polynomial_order: 2
    
  einox:
    databank: emissions
    x_axis: thrust
    y_axis: einox
    xlim: [0, 200]
    ylim: [0, 30]
    # polynomial_order: 2
    
  eico:
    databank: emissions
    x_axis: thrust
    y_axis: eico
    xlim: [0, 200]
    ylim: [0, 30]
    # polynomial_order: 2
    
  eihc:
    databank: emissions
    x_axis: thrust
    y_axis: eihc
    xlim: [0, 200]
    ylim: [0, 2]
    # polynomial_order: 2
  
  smoke_number:
    databank: emissions
    x_axis: thrust
    y_axis: smoke_number
    xlim: [0, 200]
    ylim: [0, 20]
    # polynomial_order: 2

  fuel_flow:
    databank: emissions
    x_axis: thrust
    y_axis: fuel_flow
    xlim: [0, 200]
    ylim: [0, 1.5]
    # polynomial_order: 2


